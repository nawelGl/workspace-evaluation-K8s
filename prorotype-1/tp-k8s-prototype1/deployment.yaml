apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stress-app
  template:
    metadata:
      labels:
        app: stress-app
    spec:
      containers:
      - name: spring-app
        image: binekoo/tp-k8s-prototype1:1.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: stress-service
spec:
  selector:
    app: stress-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer